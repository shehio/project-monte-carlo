{{ define "main" }}
<article class="viz-page">
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  </header>
  <div class="viz-container">
    {{ .Content }}
  </div>
</article>
{{ with .Params.js }}
  {{ if reflect.IsSlice . }}
    {{ range . }}<script src="/js/{{ . }}"></script>
    {{ end }}
  {{ else }}
    <script src="/js/{{ . }}"></script>
  {{ end }}
{{ end }}
{{ end }}
